name: Build Mobile Apps (Android + iOS)

on:
  push:
    tags:
      - 'v*'  # Only build on version tags
  workflow_dispatch:  # Manual trigger

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Clean and get dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (for Play Store)
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cognithor-android-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: cognithor-android-aab
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flutter_app/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    name: iOS IPA
    runs-on: macos-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS via xcodebuild (skip Flutter signing check)
        run: |
          # Flutter's --no-codesign still checks for team. Use xcodebuild directly.
          flutter pub get
          cd ios && pod install && cd ..

          # Build with xcodebuild, completely disabling code signing
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath ../build/ios/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            archive
          cd ..

      - name: Create IPA from archive
        run: |
          if [ -d "build/ios/Runner.xcarchive/Products/Applications/Runner.app" ]; then
            mkdir -p Payload
            cp -r "build/ios/Runner.xcarchive/Products/Applications/Runner.app" Payload/
            zip -r cognithor-ios.ipa Payload
            rm -rf Payload
          else
            echo "Archive build failed — creating from build products"
            APP_PATH=$(find build -name "Runner.app" -type d 2>/dev/null | head -1)
            if [ -n "$APP_PATH" ]; then
              mkdir -p Payload
              cp -r "$APP_PATH" Payload/
              zip -r cognithor-ios.ipa Payload
              rm -rf Payload
            else
              echo "No .app found"
              exit 1
            fi
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: cognithor-ios-ipa
          path: flutter_app/cognithor-ios.ipa

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flutter_app/cognithor-ios.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
